# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy website to Firebase Hosting on merge
on:
  push:
    branches:
      - main
    paths-ignore:
      - 'functions/**'

# Cancel an in-progress deploy when a newer commit lands on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_ID: cksc-legislation
  GAR_LOCATION: asia-east1
  SERVICE: cksc-legislation
  HOSTING_SITE: cksc-law
  REGION: asia-east1

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache packages
        uses: actions/cache@v3
        with:
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          path: node_modules
      - uses: actions/setup-node@v4
        with:
          # Pinned to 22.22.x, NOT 22.23+. Newer Node patches trip a node-fetch@2
          # gzip bug (nodejs/node#63989) that makes firebase-tools' OAuth token
          # exchange fail with "Premature close", which the CLI mislabels
          # "Failed to authenticate, have you run firebase login?". Maintainer
          # workaround (firebase-tools#10692): use Node 22.22.x or 24.16.x.
          node-version: '22.22.x'
          cache: 'npm'
      - run: yarn install --frozen-lockfile
      - run: yarn spa-build
      - run: yarn gcp-build
      - run: mkdir dist/spa/ssr-assets
      - run: mv ./dist/ssr/client/ssr-assets/* ./dist/spa/ssr-assets
      - run: mv ./dist/spa/index.html ./dist/spa/main.html # This is to prevent Google from serving the root route with a non-SSR page

      - name: Firebase Hosting Deploy
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CKSC_LEGISLATION }}
          channelId: live
          projectId: ${{ env.PROJECT_ID }}
          target: ${{ env.HOSTING_SITE }}
          # Pinned to 15.21.0 to match the functions-deploy workflow (the version
          # proven green in CI). The "Premature close" auth failure (issue #10692)
          # is actually the Node gzip bug noted on setup-node above, not a
          # firebase-tools regression — the Node pin is the real fix; this just
          # keeps both deploy workflows on one known-good CLI version.
          firebaseToolsVersion: '15.21.0'
      - name: Google Auth
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          token_format: access_token
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CKSC_LEGISLATION }}
      - name: Docker Auth
        id: docker-auth
        uses: 'docker/login-action@v2'
        with:
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
          registry: ${{ env.GAR_LOCATION }}-docker.pkg.dev

      - name: Build and Push Container
        run: |-
          docker build -t "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/firebaseapphosting-images/${{ env.SERVICE }}:${{ github.sha }}" ./
          docker push "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/firebaseapphosting-images/${{ env.SERVICE }}:${{ github.sha }}"

      - name: Create Service declaration
        run: |-
          export IMAGE="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/firebaseapphosting-images/${{ env.SERVICE }}:${{ github.sha }}"
          export SERVICE="${{ env.SERVICE }}"
          envsubst < ./.apphosting/service.template.yaml > service.yaml

      - name: Deploy to Cloud Run (Firebase App Hosting)
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          metadata: service.yaml

      - name: Show Output
        run: echo ${{ steps.deploy.outputs.url }}

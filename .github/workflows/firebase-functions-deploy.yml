name: Deploy Cloud Functions (manual)

# Manual only — Functions are never deployed automatically. Trigger from the
# Actions tab ("Run workflow"). Deploy auth uses the same service-account secret
# as the hosting/Cloud Run deploy.
on:
  workflow_dispatch:

# Don't let two manual function deploys race each other.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  PROJECT_ID: cksc-legislation
  # Pinned to match the hosting workflow: 15.22.x regressed service-account auth
  # (upstream firebase-tools #10692). 15.21.0 is the last known-good version.
  FIREBASE_TOOLS_VERSION: '15.21.0'

jobs:
  deploy_functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Pinned to 24.16.0 (a 24.16.x patch), NOT 24.17+. Newer Node patches
          # trip a node-fetch@2 gzip bug (nodejs/node#63989) that makes
          # firebase-tools' OAuth token exchange fail with "Premature close",
          # mislabelled "Failed to authenticate, have you run firebase login?".
          # Maintainer-recommended workaround (firebase-tools#10692): use Node
          # 22.22.x or 24.16.x. Functions require Node 24, so 24.16.0 it is.
          node-version: '24.16.0'
          cache: 'npm'

      - name: Cache packages
        uses: actions/cache@v3
        with:
          key: ${{ runner.os }}-functions-yarn-${{ hashFiles('functions/yarn.lock') }}
          path: functions/node_modules

      - name: Install functions dependencies
        run: |
          cd functions
          yarn install --frozen-lockfile

      - name: Restore runtime service-account credential
        # The google-drive-uploader key is read at runtime by functions/src/index.ts
        # (keyFile: 'src/credential.json'). It is gitignored and never committed — it
        # lives only as the FUNCTIONS_CREDENTIAL_JSON secret and is materialised here so
        # it ships with the deployed source. Written via env (not inline) to keep the
        # secret out of the command line and logs.
        run: printf '%s' "$FUNCTIONS_CREDENTIAL_JSON" > functions/src/credential.json
        env:
          FUNCTIONS_CREDENTIAL_JSON: ${{ secrets.FUNCTIONS_CREDENTIAL_JSON }}

      - name: Restore functions runtime .env
        # functions/.env holds GMAIL_EMAIL / GMAIL_PASSWORD, read at module load by
        # functions/src/index.ts + amendments.ts and passed to nodemailer. It is gitignored
        # and never committed, so a checkout-only runner deploys functions without them and
        # every sendMail fails at runtime with "Missing credentials for PLAIN" (EAUTH).
        # firebase deploy bundles functions/.env as the deployed runtime env, so we
        # materialise it here from the FUNCTIONS_ENV secret (via env, not inline, to keep it
        # out of the command line and logs), exactly like credential.json above.
        run: printf '%s' "$FUNCTIONS_ENV" > functions/.env
        env:
          FUNCTIONS_ENV: ${{ secrets.FUNCTIONS_ENV }}

      - name: Write deploy service-account key
        # The Firebase CLI authenticates from a service-account key file pointed to by
        # GOOGLE_APPLICATION_CREDENTIALS — the same mechanism the hosting deploy's
        # action-hosting-deploy uses internally. (google-github-actions/auth's credential
        # file isn't consumed by firebase-tools, which falls through to "firebase login".)
        # Written to RUNNER_TEMP, outside the repo, so it never ships with the source.
        run: printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-sa.json"
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CKSC_LEGISLATION }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@${{ env.FIREBASE_TOOLS_VERSION }}

      - name: Deploy functions
        # predeploy hooks (lint + tsc build) run automatically from firebase.json.
        run: firebase deploy --only functions --project ${{ env.PROJECT_ID }} --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json

      - name: Remove deploy service-account key
        if: always()
        run: rm -f "$RUNNER_TEMP/firebase-sa.json"
